version: "3.9"

services:

  backend:

    build: .

    container_name: hallucination_backend

    ports:

      - "8000:8000"

    env_file:

      - .env

    volumes:

      - .:/app

  frontend:

    build: ./frontend

    container_name: hallucination_frontend

    ports:

      - "5173:5173"

    depends_on:

      - backend

    volumes:

      - ./frontend:/app